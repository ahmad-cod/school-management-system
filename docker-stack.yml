services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: schooldb
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    image: school-management-backend:latest
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: schooldb
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.1'   # Sized down for easy testing
          memory: 256M
      restart_policy:
        condition: on-failure

networks:
  default:
    driver: overlay